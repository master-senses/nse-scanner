name: Quote refresh

on:
  schedule:
    - cron: "45 3 * * 1-5"      # 09:15 IST
    - cron: "15,45 4-9 * * 1-5"  # every 30 min, 09:45–15:15 IST
    - cron: "0 10 * * 1-5"       # 15:30 IST
  workflow_dispatch:

concurrency:
  group: quote-refresh
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Fetch quotes and rebuild site
        env:
          ANGEL_API_KEY: ${{ secrets.ANGEL_API_KEY }}
          ANGEL_CLIENT_CODE: ${{ secrets.ANGEL_CLIENT_CODE }}
          ANGEL_PIN: ${{ secrets.ANGEL_PIN }}
          ANGEL_TOTP_SECRET: ${{ secrets.ANGEL_TOTP_SECRET }}
        run: python scripts/refresh_github_pages.py

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/index.html docs/quotes.json
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "chore: update cached market quotes"
            git push
          fi
